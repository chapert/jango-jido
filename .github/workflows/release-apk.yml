name: Release APK

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Restore Android signing key
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks
          cat > android/app/keystore.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Prepare release asset
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "jango-jido-${GITHUB_REF_NAME}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk jango-jido.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jango-jido-${{ github.ref_name }}.apk
            jango-jido.apk
          generate_release_notes: true
          make_latest: true
